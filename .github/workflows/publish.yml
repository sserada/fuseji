name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      target:
        description: '公開先 (testpypi で検証 → pypi で本番公開)'
        required: true
        type: choice
        options:
          - testpypi
          - pypi
  push:
    tags:
      # vX.Y.Z 形式のタグ push 時に PyPI 本番へ自動公開
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # version 推定や changelog 生成のため履歴フル取得
      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Install dependencies (all extras for mypy stubs)
        run: uv sync --all-extras
      - name: ruff check
        run: uv run ruff check src/ tests/
      - name: ruff format check
        run: uv run ruff format --check src/ tests/
      - name: mypy
        run: uv run mypy src/
      - name: pytest
        run: uv run pytest -q
      - name: Build distributions
        run: uv build
      - name: Verify built artifacts
        run: |
          ls -la dist/
          uv run python -m zipfile -l dist/*.whl | head -20
      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/fuseji
    permissions:
      id-token: write  # OIDC token for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fuseji
    permissions:
      id-token: write  # OIDC token for trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
