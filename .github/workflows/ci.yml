name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint / type-check (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies (all extras for mypy stubs)
        run: uv sync --all-extras
      - name: ruff check
        run: uv run ruff check src/ tests/
      - name: ruff format check
        run: uv run ruff format --check src/ tests/
      - name: mypy
        run: uv run mypy src/

  test-core:
    name: test (core, ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Python 3.14 まで含める。test-extras（ginza）は spaCy 3.8 の wheel 制約で
        # 3.13 までしか試せないため、本マトリクスは core のみ。
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Install dependencies (core only — extras なし)
        run: uv sync --python ${{ matrix.python }}
      - name: pytest (extras なし — ginza/server テストは skip)
        run: uv run pytest -q

  test-extras:
    name: test (all extras, Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install all extras (ginza + server)
        run: uv sync --all-extras
      # all-extras 環境では server/ginza モジュールもカバレッジ計測されるため、
      # 90% gate を本ジョブだけで適用する（core matrix は server/ginza を除外し
      # ても全体率が下がるので gate を付けない）。
      - name: pytest (all extras + coverage gate)
        run: uv run pytest -q --cov-fail-under=90

  bench:
    name: bench (informational)
    runs-on: ubuntu-latest
    # 情報表示のみ。回帰検知 assertion 化は別 Issue で対応。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: pytest-benchmark (情報表示)
        run: |
          uv run pytest tests/bench/ --benchmark-enable \
            --benchmark-columns=min,mean,max,stddev,median \
            --benchmark-group-by=group \
            --benchmark-warmup=on
